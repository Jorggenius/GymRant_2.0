<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymRat Admin - Login</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="auth-body">
  <div class="login-container">
    <div class="login-card">
      <h1>GymRat Admin</h1>
      <p class="subtitle">Acceso exclusivo para administrador</p>

      <form id="loginForm" class="form-grid">
        <div class="field">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Ingrese usuario" required />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Ingrese contraseña" required />
        </div>

        <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
      </form>

      <div id="authMessage" class="message hidden"></div>

      <div class="login-help">
        <small>Para esta prueba usa:</small>
        <small><strong>Usuario:</strong> admin</small>
        <small><strong>Contraseña:</strong> admin</small>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
